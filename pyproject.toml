[tool.ruff]
target-version = "py311"
line-length = 120
src = ["."]

[tool.ruff.lint]
select = [
    "F821",  # undefined name
    "F822",  # undefined export
    "F823",  # undefined local
    "F401",  # unused import
    "F403",  # import *
    "F405",  # name may be undefined from star import
]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"auto_forward_tester.py" = ["F403", "F405"]
"forward/__init__.py" = ["F403", "F405"]
"forward/ledger.py" = ["F403", "F405"]
"scripts/split_forward_tester.py" = ["F403", "F405"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
